naftiko: 1.0.0-alpha2
info:
  label: NHTSA Crash Data API
  description: The NHTSA Crash Data API provides public access to U.S. National Highway Traffic Safety Administration crash
    datasets including the Fatality Analysis Reporting System (FARS) and the Crash Report Sampling System (CRSS). The API
    exposes case lists, case details, and aggregated crash queries by location, vehicle, and occupant via REST endpoints that
    return JSON, XML, or CSV.
  tags:
  - Nhtsa
  - Crash
  - Api
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: nhtsa-crash-api
    baseUri: https://crashviewer.nhtsa.dot.gov/CrashAPI
    description: NHTSA Crash Data API HTTP API.
    resources:
    - name: farsdata-getfarsdata
      path: /FARSData/GetFARSData
      operations:
      - name: getfarsdata
        method: GET
        description: Get FARS dataset
        inputParameters:
        - name: dataset
          in: query
          type: string
          required: true
          description: FARS dataset name (e.g., Accident, Vehicle, Person).
        - name: caseYear
          in: query
          type: integer
          required: true
          description: Case year (YYYY).
        - name: format
          in: query
          type: string
          description: Response format.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: crashes-getcaselist
      path: /crashes/GetCaseList
      operations:
      - name: getcaselist
        method: GET
        description: Get case list
        inputParameters:
        - name: states
          in: query
          type: string
          required: true
          description: State FIPS code(s), comma separated.
        - name: fromCaseYear
          in: query
          type: integer
          required: true
          description: Beginning case year.
        - name: toCaseYear
          in: query
          type: integer
          required: true
          description: Ending case year.
        - name: minNumOfVehicles
          in: query
          type: integer
          description: Minimum number of vehicles involved.
        - name: maxNumOfVehicles
          in: query
          type: integer
          description: Maximum number of vehicles involved.
        - name: format
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: crashes-getcasedetails
      path: /crashes/GetCaseDetails
      operations:
      - name: getcasedetails
        method: GET
        description: Get case details
        inputParameters:
        - name: stateCase
          in: query
          type: string
          required: true
          description: State case number.
        - name: caseYear
          in: query
          type: integer
          required: true
        - name: state
          in: query
          type: integer
          required: true
          description: State FIPS code.
        - name: format
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: crashes-getcrashesbylocation
      path: /crashes/GetCrashesByLocation
      operations:
      - name: getcrashesbylocation
        method: GET
        description: Get crashes by location
        inputParameters:
        - name: fromCaseYear
          in: query
          type: integer
          required: true
        - name: toCaseYear
          in: query
          type: integer
          required: true
        - name: state
          in: query
          type: integer
          required: true
          description: State FIPS code.
        - name: county
          in: query
          type: integer
          description: County FIPS code.
        - name: format
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: crashes-getcrashesbyvehicle
      path: /crashes/GetCrashesByVehicle
      operations:
      - name: getcrashesbyvehicle
        method: GET
        description: Get crashes by vehicle
        inputParameters:
        - name: fromCaseYear
          in: query
          type: integer
          required: true
        - name: toCaseYear
          in: query
          type: integer
          required: true
        - name: state
          in: query
          type: integer
          required: true
        - name: vPicMake
          in: query
          type: string
        - name: vPicModel
          in: query
          type: string
        - name: vPicBodyClass
          in: query
          type: string
        - name: format
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: crashes-getcrashesbyoccupant
      path: /crashes/GetCrashesByOccupant
      operations:
      - name: getcrashesbyoccupant
        method: GET
        description: Get crashes by occupant
        inputParameters:
        - name: fromCaseYear
          in: query
          type: integer
          required: true
        - name: toCaseYear
          in: query
          type: integer
          required: true
        - name: state
          in: query
          type: integer
          required: true
        - name: minAge
          in: query
          type: integer
        - name: maxAge
          in: query
          type: integer
        - name: sex
          in: query
          type: integer
        - name: seatPos
          in: query
          type: integer
        - name: format
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: nhtsa-crash-api-rest
    description: REST adapter for NHTSA Crash Data API.
    resources:
    - path: /FARSData/GetFARSData
      name: getfarsdata
      operations:
      - method: GET
        name: getfarsdata
        description: Get FARS dataset
        call: nhtsa-crash-api.getfarsdata
        outputParameters:
        - type: object
          mapping: $.
    - path: /crashes/GetCaseList
      name: getcaselist
      operations:
      - method: GET
        name: getcaselist
        description: Get case list
        call: nhtsa-crash-api.getcaselist
        outputParameters:
        - type: object
          mapping: $.
    - path: /crashes/GetCaseDetails
      name: getcasedetails
      operations:
      - method: GET
        name: getcasedetails
        description: Get case details
        call: nhtsa-crash-api.getcasedetails
        outputParameters:
        - type: object
          mapping: $.
    - path: /crashes/GetCrashesByLocation
      name: getcrashesbylocation
      operations:
      - method: GET
        name: getcrashesbylocation
        description: Get crashes by location
        call: nhtsa-crash-api.getcrashesbylocation
        outputParameters:
        - type: object
          mapping: $.
    - path: /crashes/GetCrashesByVehicle
      name: getcrashesbyvehicle
      operations:
      - method: GET
        name: getcrashesbyvehicle
        description: Get crashes by vehicle
        call: nhtsa-crash-api.getcrashesbyvehicle
        outputParameters:
        - type: object
          mapping: $.
    - path: /crashes/GetCrashesByOccupant
      name: getcrashesbyoccupant
      operations:
      - method: GET
        name: getcrashesbyoccupant
        description: Get crashes by occupant
        call: nhtsa-crash-api.getcrashesbyoccupant
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
