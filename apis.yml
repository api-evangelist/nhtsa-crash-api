aid: nhtsa-crash-api
name: NHTSA Crash API
description: >-
  The NHTSA Crash Data API provides access to the National Highway Traffic Safety
  Administration's crash data including crash reports, vehicle information, and
  safety statistics collected through the Fatality Analysis Reporting System (FARS)
  and Crash Report Sampling System (CRSS).
